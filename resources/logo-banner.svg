<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="200" y1="60" x2="780" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="200" rx="16" fill="url(#bannerBg)"/>

  <!-- Logo icon -->
  <g transform="translate(24, 16) scale(0.33)">
    <!-- Tail: drawn first so board covers the base -->
    <path d="M400 430 Q435 432 462 405 Q492 372 504 330 Q516 285 508 248 L496 250 Q504 288 494 330 Q484 372 460 398 Q442 416 424 418Z" fill="#7c3aed"/>

    <!-- Board -->
    <rect x="48" y="120" width="400" height="310" rx="44" fill="#7c3aed"/>

    <!-- Columns -->
    <rect x="104" y="180" width="80" height="140" rx="16" fill="rgba(255,255,255,0.26)"/>
    <rect x="208" y="180" width="80" height="96" rx="16" fill="rgba(255,255,255,0.26)"/>
    <rect x="312" y="180" width="80" height="166" rx="16" fill="rgba(255,255,255,0.26)"/>

    <!-- Eyes -->
    <circle cx="178" cy="114" r="44" fill="#7c3aed"/>
    <circle cx="330" cy="114" r="44" fill="#7c3aed"/>
    <circle cx="178" cy="114" r="30" fill="white"/>
    <circle cx="330" cy="114" r="30" fill="white"/>
    <circle cx="186" cy="117" r="16" fill="#4c1d95"/>
    <circle cx="338" cy="117" r="16" fill="#4c1d95"/>
    <circle cx="192" cy="112" r="7" fill="white"/>
    <circle cx="344" cy="112" r="7" fill="white"/>

    <!-- Horns -->
    <circle cx="132" cy="90" r="22" fill="#7c3aed"/>
    <circle cx="376" cy="90" r="22" fill="#7c3aed"/>

    <!-- Hands -->
    <ellipse cx="108" cy="122" rx="16" ry="11" fill="#a78bfa"/>
    <ellipse cx="400" cy="122" rx="16" ry="11" fill="#a78bfa"/>
  </g>

  <!-- Text: Familiar -->
  <text x="210" y="115" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" letter-spacing="-2" fill="url(#textGrad)">
    Familiar
  </text>

  <!-- Tagline -->
  <text x="214" y="148" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="16" font-weight="400" fill="rgba(167,139,250,0.7)">
    Orchestrate tens of coding agents in a Familiar Kanban Board
  </text>
</svg>
