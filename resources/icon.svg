  <!-- Board -->
  <rect x="48" y="120" width="400" height="310" rx="44" fill="#7c3aed"/>

  <!-- Centered kanban columns -->
  <rect x="104" y="180" width="80" height="140" rx="16" fill="rgba(255,255,255,0.26)"/>
  <rect x="208" y="180" width="80" height="96" rx="16" fill="rgba(255,255,255,0.26)"/>
  <rect x="312" y="180" width="80" height="166" rx="16" fill="rgba(255,255,255,0.26)"/>

  <!-- Eyes peeking over top -->
  <circle cx="178" cy="114" r="44" fill="#7c3aed"/>
  <circle cx="330" cy="114" r="44" fill="#7c3aed"/>
  <circle cx="178" cy="114" r="30" fill="white"/>
  <circle cx="330" cy="114" r="30" fill="white"/>
  <circle cx="186" cy="117" r="16" fill="#4c1d95"/>
  <circle cx="338" cy="117" r="16" fill="#4c1d95"/>
  <circle cx="192" cy="112" r="7" fill="white"/>
  <circle cx="344" cy="112" r="7" fill="white"/>

  <!-- Round horns -->
